<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 974 684" width="100%">
<style>
  @keyframes glow {
    0%   { filter: drop-shadow(0 0 2px #ff6b6b); }
    25%  { filter: drop-shadow(0 0 8px #ffd93d); }
    50%  { filter: drop-shadow(0 0 12px #6bcb77); }
    75%  { filter: drop-shadow(0 0 8px #4d96ff); }
    100% { filter: drop-shadow(0 0 2px #ff6b6b); }
  }
  @keyframes scanline {
    0%   { transform: translateY(0); }
    100% { transform: translateY(13.2px); }
  }
  @keyframes flicker {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.97; }
  }
  .line {
    font-family: monospace;
    font-size: 11px;
    white-space: pre;
    animation: glow 4s ease-in-out infinite;
  }
  .scanlines {
    animation: flicker 3s infinite;
  }
</style>

<defs>
  <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#ff6b6b">
      <animate attributeName="stop-color" values="#ff6b6b;#ffd93d;#6bcb77;#4d96ff;#9b59b6;#ff6b6b" dur="6s" repeatCount="indefinite"/>
    </stop>
    <stop offset="50%" stop-color="#4d96ff">
      <animate attributeName="stop-color" values="#4d96ff;#9b59b6;#ff6b6b;#ffd93d;#6bcb77;#4d96ff" dur="6s" repeatCount="indefinite"/>
    </stop>
    <stop offset="100%" stop-color="#6bcb77">
      <animate attributeName="stop-color" values="#6bcb77;#4d96ff;#9b59b6;#ff6b6b;#ffd93d;#6bcb77" dur="6s" repeatCount="indefinite"/>
    </stop>
  </linearGradient>
  <filter id="glow">
    <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#4d96ff">
      <animate attributeName="flood-color" values="#ff6b6b;#ffd93d;#6bcb77;#4d96ff;#9b59b6;#ff6b6b" dur="6s" repeatCount="indefinite"/>
    </feDropShadow>
  </filter>
  <filter id="scanlinePattern">
    <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" result="noise"/>
    <feColorMatrix type="saturate" values="0" in="noise" result="gray"/>
    <feComponentTransfer in="gray" result="scan">
      <feFuncA type="discrete" tableValues="0 0 0 0 0.06 0 0 0 0 0"/>
    </feComponentTransfer>
    <feComposite in="SourceGraphic" in2="scan" operator="in"/>
  </filter>
</defs>

<!-- Background -->
<rect width="100%" height="100%" fill="#0d1117"/>

<!-- TV Antenna -->
<polyline points="(457, 8) (487, 40) (517, 8)" stroke="#333" stroke-width="3" fill="none"/>
<line x1="487" y1="40" x2="487" y2="60" stroke="#333" stroke-width="3"/>
<circle cx="487" cy="8" r="4" fill="#ff6b6b">
  <animate attributeName="fill" values="#ff6b6b;#ffd93d;#6bcb77;#4d96ff" dur="2s" repeatCount="indefinite"/>
</circle>

<!-- TV outer frame -->
<rect x="30" y="30" width="914.4" height="614.4" rx="20" ry="20" fill="#2a2a2a" stroke="#444" stroke-width="3"/>

<!-- Inner frame bevel -->
<rect x="38" y="38" width="898.4" height="598.4" rx="14" ry="14" fill="#1a1a1a" stroke="#555" stroke-width="1"/>

<!-- Screen area -->
<rect x="58" y="58" width="858.4" height="528.4" rx="4" ry="4" fill="#0d1117" stroke="#333" stroke-width="1"/>

<!-- Power indicator -->
<circle cx="914.4" cy="48" r="4" fill="#39d353">
  <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
</circle>
<text x="922.4" y="52" fill="#666" font-size="8" font-family="monospace">ON</text>

<!-- Brand label -->
<text x="50" y="52" fill="#555" font-size="9" font-family="monospace" font-weight="bold">ZAVIA</text>

